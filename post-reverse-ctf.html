      <h2 id="observe">观察</h2>
      <p>逆向题复盘可以先写输入、输出和状态变化，再决定是否需要贴伪代码。越是复杂的题，越需要保留“为什么这么判断”的过程。</p>
      <h2 id="model">建模</h2>
      <p>把分支看成状态，把校验看成约束，很多代码会变得更容易描述。文章页右侧目录会自动读取二级标题，适合长文导航。</p>
      <h2 id="verify">验证</h2>
      <p>最后用最小样本验证关键结论，并记录失败样本。这比只写成功路径更像一篇对自己有用的笔记。</p>
